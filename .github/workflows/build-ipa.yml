name: Build Flutter Unsigned IPA

on:
  push:
    tags:
      - 'v*' # 觸發條件：只有當 push 上來的 tag 名稱是以 'v' 開頭時 (例如 v1.0, v2.1.3) 才會執行
  workflow_dispatch: # 依然保留網頁手動觸發功能，以備不時之需

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS Unsigned
        run: flutter build ios --release --no-codesign

      - name: Package App into .ipa
        run: |
          # 進入 Flutter 編譯出 .app 的目錄
          cd build/ios/iphoneos
          
          # 建立標準的 Payload 資料夾
          mkdir Payload
          
          # 將編譯好的 Runner.app 移入 Payload
          mv Runner.app Payload/
          
          # 將 Payload 壓縮成 .ipa，並在檔名中自動加入當前的 Tag 名稱
          zip -r "FlutterApp-${{ github.ref_name }}.ipa" Payload

      - name: Upload .ipa as Artifact
        uses: actions/upload-artifact@v4
        with:
          # Artifact 的名稱也會加上 Tag 方便辨識
          name: Flutter-IPA-${{ github.ref_name }}
          path: build/ios/iphoneos/FlutterApp-${{ github.ref_name }}.ipa
          retention-days: 7