name: Build Flutter Unsigned IPA

on:
  push:
    tags:
      - 'v*' # 當 push 的 tag 是 v 開頭時觸發
  workflow_dispatch: # 保留網頁手動觸發

# 關鍵設定：賦予此工作有寫入專案 Release 的權限
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS Unsigned
        run: flutter build ios --release --no-codesign

      - name: Package App into .ipa
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -r "FlutterApp-${{ github.ref_name }}.ipa" Payload

      # 保留原本的 Artifact 上傳（作為雙重備份）
      - name: Upload .ipa as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flutter-IPA-${{ github.ref_name }}
          path: build/ios/iphoneos/FlutterApp-${{ github.ref_name }}.ipa
          retention-days: 7

      # 新增步驟：自動建立 GitHub Release 並掛載 .ipa 檔案
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/ios/iphoneos/FlutterApp-${{ github.ref_name }}.ipa
          name: "App 發布版本 ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true # 自動把這次跟上次 Tag 之間的 Commit 記錄當作更新日誌